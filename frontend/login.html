<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFUTURE - Sign In</title>
    <link rel="stylesheet" href="assets/css/kinetic-noir.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/assets/css/all.min.css">
</head>
<body class="auth-page">
    <script>
        if (window.self !== window.top) {
            document.body.classList.add('in-drawer');
        }
    </script>
    <div class="auth-layout">
        <!-- Background -->
        <div class="auth-bg">
            <video autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover; filter: grayscale(90%) brightness(0.3) blur(2px);">
                <source src="assets/videos/fitai.mp4" type="video/mp4">
            </video>
        </div>

        <div class="auth-card fade-in-scroll is-visible">
            <div style="text-align: center; margin-bottom: 2rem;">
                 <a href="/" class="nav-brand" style="justify-content: center; font-size: 1.8rem; margin-bottom:1.5rem;">⚡ <span style="font-style:italic;">FITFUTURE</span></a>
                 <h2 class="title-giant" style="font-size: 2.8rem; margin-bottom: 0.5rem; line-height:1;">WELCOME<br>BACK.</h2>
                 <p style="color:var(--text-secondary); font-size:0.8rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;">Enter your credentials to access the zone</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" name="email" required placeholder="CHAMPION@KINETIC.APP">
                </div>

                <div class="form-group">
                    <div style="display:flex; justify-content:space-between;">
                        <label for="password">PASSWORD</label>
                        <a href="#" style="color:var(--text-secondary); font-size:0.75rem; text-decoration:none; font-weight:700;">FORGOT PASSWORD?</a>
                    </div>
                    <div style="position:relative;">
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <i class="fas fa-eye" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:var(--text-secondary); cursor:pointer;"></i>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn-neon" style="width:100%;">SIGN IN</button>
                </div>

                <div style="display:flex; align-items:center; margin: 2rem 0; color:var(--text-secondary); font-size:0.75rem; font-weight:800; letter-spacing:1px;">
                    <div style="flex:1; height:1px; background:var(--bg-input);"></div>
                    <span style="padding:0 1rem; text-transform:uppercase;">Or Connect With</span>
                    <div style="flex:1; height:1px; background:var(--bg-input);"></div>
                </div>

                <div style="display:flex; gap:1rem;">
                    <button type="button" style="flex:1; background:var(--bg-input); border:1px solid transparent; color:var(--text-primary); padding:1rem; border-radius:4px; font-family:inherit; font-weight:800; font-size:0.8rem; cursor:pointer; display:flex; justify-content:center; align-items:center; gap:0.5rem; transition:background 0.2s;">
                        <i class="fab fa-google"></i> GOOGLE
                    </button>
                    <button type="button" style="flex:1; background:var(--bg-input); border:1px solid transparent; color:var(--text-primary); padding:1rem; border-radius:4px; font-family:inherit; font-weight:800; font-size:0.8rem; cursor:pointer; display:flex; justify-content:center; align-items:center; gap:0.5rem; transition:background 0.2s;">
                        <i class="fab fa-apple"></i> APPLE
                    </button>
                </div>
            </form>

            <div class="auth-switch">
                NEW TO THE COLLECTIVE? <a href="register.html" style="margin-left:0.5rem; border-bottom: 2px solid var(--neon-green); padding-bottom:2px;">CREATE AN ACCOUNT</a>
            </div>
        </div>
    </div>

    <!-- Integrate original functionality -->
    <script src="assets/js/auth.js"></script>
    <script>
        // Make the eye icon toggle password visibility
        document.querySelector('.fa-eye').addEventListener('click', function() {
            var pwd = document.getElementById('password');
            if(pwd.type === 'password') {
                pwd.type = 'text';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                pwd.type = 'password';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
