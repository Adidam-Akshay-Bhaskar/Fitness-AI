<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFILE_CORE | GENESIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/kinetic-noir.css">
    <style>
        :root {
            --noir-accent: #d4ff00;
            --noir-bg: #050507;
            --noir-card: rgba(20, 20, 25, 0.6);
            --noir-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--noir-bg);
            color: white;
            padding-bottom: 100px;
        }

        .profile-hero {
            height: 400px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), var(--noir-bg)), url('simple_athlete_1776834084422.png') center/cover;
            display: flex;
            align-items: flex-end;
            padding: 4rem;
        }

        .profile-container {
            max-width: 1200px;
            margin: -100px auto 0;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 3rem;
            padding: 0 2rem;
        }

        .sidebar-card {
            background: var(--noir-card);
            backdrop-filter: blur(40px);
            border: 1px solid var(--noir-border);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--noir-accent);
            margin: 0 auto 2rem;
            background: url('simple_athlete_1776834084422.png') center/cover;
            box-shadow: 0 0 30px rgba(212, 255, 0, 0.2);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .data-section {
            background: var(--noir-card);
            backdrop-filter: blur(40px);
            border: 1px solid var(--noir-border);
            padding: 3rem;
            border-radius: 24px;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 950;
            color: var(--noir-accent);
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--noir-border);
            color: white;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--noir-accent);
            background: rgba(212, 255, 0, 0.05);
        }

        .btn-save {
            background: var(--noir-accent);
            color: black;
            border: none;
            padding: 1.5rem 3rem;
            border-radius: 12px;
            font-weight: 950;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="profile-hero">
        <h1 style="font-size: 6rem; font-weight: 950; letter-spacing: -3px;">COMMANDER_<span style="color:var(--noir-accent);" id="hero-name">USER</span></h1>
    </div>

    <div class="profile-container">
        <div class="sidebar-card">
            <div class="profile-pic"></div>
            <h2 id="card-name" style="font-weight: 950; margin-bottom: 0.5rem;">USER NAME</h2>
            <p id="card-email" style="color: var(--noir-text-dim); font-size: 0.8rem; font-weight: 700;">USER@GENESIS.SYS</p>
            
            <div style="margin-top: 3rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px;">
                    <div style="font-size: 0.6rem; color: var(--noir-text-dim);">LEVEL</div>
                    <div style="font-size: 1.5rem; font-weight: 950;">14</div>
                </div>
                <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px;">
                    <div style="font-size: 0.6rem; color: var(--noir-text-dim);">RANK</div>
                    <div style="font-size: 1.5rem; font-weight: 950; color: var(--noir-accent);">A+</div>
                </div>
            </div>
            
            <button onclick="window.location.href='dashboard-v2.html'" style="width: 100%; margin-top: 2rem; background: transparent; border: 1px solid var(--noir-border); color: white; padding: 1rem; border-radius: 12px; font-weight: 900; cursor: pointer;">RETURN_TO_BASE</button>
        </div>

        <div class="main-content">
            <div class="data-section">
                <h3 style="font-size: 1.2rem; font-weight: 950; letter-spacing: 2px; margin-bottom: 3rem; border-bottom: 1px solid var(--noir-border); padding-bottom: 1rem;">BIO_PARAMETERS</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="input-group">
                        <label>FIRST_NAME</label>
                        <input type="text" id="firstName" placeholder="INITIATE...">
                    </div>
                    <div class="input-group">
                        <label>LAST_NAME</label>
                        <input type="text" id="lastName" placeholder="INITIATE...">
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>COMMUNICATION_CHANNELS</label>
                        <input type="email" id="email" placeholder="ENCRYPTED EMAIL...">
                    </div>
                    <div class="input-group">
                        <label>HEIGHT (CM)</label>
                        <input type="number" id="height" placeholder="000">
                    </div>
                    <div class="input-group">
                        <label>WEIGHT (KG)</label>
                        <input type="number" id="weight" placeholder="00.0">
                    </div>
                </div>
                <button class="btn-save" onclick="saveProfile()">SYNC_PARAMETERS</button>
            </div>
        </div>
    </div>

    <script>
        async function loadProfile() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('firstName').value = data.first_name || '';
                    document.getElementById('lastName').value = data.last_name || '';
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('height').value = data.height || '';
                    document.getElementById('weight').value = data.weight || '';
                    
                    document.getElementById('hero-name').innerText = (data.first_name || 'USER').toUpperCase();
                    document.getElementById('card-name').innerText = `${data.first_name || ''} ${data.last_name || ''}`.trim().toUpperCase();
                    document.getElementById('card-email').innerText = (data.email || '').toUpperCase();
                }
            } catch (err) { console.error("Profile sync failed", err); }
        }

        async function saveProfile() {
            const token = localStorage.getItem('token');
            const data = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value
            };

            try {
                const response = await fetch('/api/user/profile', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert("PARAMETERS SYNCED SUCCESSFULLY.");
                    loadProfile();
                }
            } catch (err) { console.error("Save failed", err); }
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
